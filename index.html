<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Colorado Congressional District 2 (Interactive)</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- KML -> GeoJSON -->
  <script src="https://unpkg.com/@tmcw/togeojson@6.0.0/dist/togeojson.umd.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100vh; width: 100%; }
    .legend {
      background: white;
      padding: 10px 12px;
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.15);
      font: 14px/1.3 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      max-width: 320px;
    }
    .legend small { display: block; opacity: .75; margin-top: 6px; }
  </style>
</head>

<body>
<div id="map"></div>

<script>
  // --- Map base ---
  const map = L.map("map", {
    scrollWheelZoom: true,   // movable/zoomable
    dragging: true,
    touchZoom: true,
    doubleClickZoom: true,
  });

  // OpenStreetMap tiles
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 18,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Simple title/attribution panel
  const legend = L.control({ position: "topright" });
  legend.onAdd = () => {
    const div = L.DomUtil.create("div", "legend");
    div.innerHTML = `
      <b>Colorado – Congressional District 2</b><br/>
      Interactive map (pan/zoom)
      <small>Boundary source: U.S. Census Bureau (Cartographic Boundary KML, CD119, 2024).</small>
    `;
    return div;
  };
  legend.addTo(map);

  // --- Load KML and filter to CO CD-02 ---
  // Put the extracted KML next to this HTML file:
  const KML_FILE = "cb_2024_08_cd119_500k.kml";

  fetch(KML_FILE)
    .then(r => {
      if (!r.ok) throw new Error(`Could not load ${KML_FILE} (${r.status})`);
      return r.text();
    })
    .then(kmlText => {
      const dom = new DOMParser().parseFromString(kmlText, "text/xml");
      const gj = toGeoJSON.kml(dom);

      // Keep only Colorado (STATEFP=08) and District 2 (CD119FP=02)
      const filtered = {
        type: "FeatureCollection",
        features: (gj.features || []).filter(f => {
          const p = f.properties || {};
          // Some KML exports vary; check common field names
          const state =
            p.STATEFP ?? p.statefp ?? p.STATE ?? p.StateFP ?? null;
          const cd =
            p.CD119FP ?? p.cd119fp ?? p.CD ?? p.DISTRICT ?? null;

          return String(state).padStart(2,"0") === "08" && String(cd).padStart(2,"0") === "02";
        })
      };

      if (!filtered.features.length) {
        throw new Error("No features matched CO CD-02. (Property names may differ in your KML.)");
      }

      const layer = L.geoJSON(filtered, {
        style: {
          weight: 3,
          opacity: 0.9,
          fillOpacity: 0.15
        },
        onEachFeature: (feature, lyr) => {
          const p = feature.properties || {};
          const name = p.NAMELSAD ?? p.NAME ?? "Colorado Congressional District 2";
          lyr.bindPopup(`<b>${name}</b>`);
        }
      }).addTo(map);

      map.fitBounds(layer.getBounds(), { padding: [20, 20] });
    })
    .catch(err => {
      console.error(err);
      alert(err.message);
    });
</script>
</body>
</html>
